<script>
const HASH="efba2688178e161b5e18bb41148a77116aac139d17fd4ce39d291c033a822f5b";

async function sha256(text){
  const data=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const pw=document.getElementById('auth-input').value;
  const hash=await sha256(pw);
  if(hash===HASH){
    sessionStorage.setItem('pb_auth',Date.now().toString());
    showDashboard();
  } else {
    document.getElementById('auth-error').style.display='block';
    document.getElementById('auth-input').value='';
    document.getElementById('auth-input').focus();
  }
}

function showDashboard(){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('root').style.display='block';
  if(window.resetCountdown) window.resetCountdown();
  startSessionTimer();
}

var sessionTimerId=null;

function lockDashboard(){
  if(sessionTimerId){clearInterval(sessionTimerId);sessionTimerId=null;}
  sessionStorage.removeItem('pb_auth');
  document.getElementById('root').style.display='none';
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('auth-input').value='';
  document.getElementById('auth-error').style.display='none';
  document.getElementById('auth-input').focus();
}

function togglePw(){
  var inp=document.getElementById('auth-input');
  if(inp.type==='password'){
    inp.type='text';
    document.getElementById('ico-hide').style.display='none';
    document.getElementById('ico-show').style.display='block';
  }else{
    inp.type='password';
    document.getElementById('ico-hide').style.display='block';
    document.getElementById('ico-show').style.display='none';
  }
  inp.focus();
}

function startSessionTimer(){
  if(sessionTimerId) clearInterval(sessionTimerId);
  sessionTimerId=setInterval(function(){
    const loginTime=parseInt(sessionStorage.getItem('pb_auth')||'0');
    if(!loginTime || Date.now()-loginTime > 180000){
      lockDashboard();
    }
  },5000);
}

const saved=parseInt(sessionStorage.getItem('pb_auth')||'0');
if(saved && (Date.now()-saved < 180000)){
  showDashboard();
}
</script>

      </div>
    </header>

    <div style={{padding:"16px 24px",maxWidth:1440,margin:"0 auto"}}>
      <div style={{display:"flex",gap:4,marginBottom:16,background:"#1c1917",borderRadius:12,padding:4,width:"fit-content"}}>
        {tabBtn("overview","Overview")}{tabBtn("table","Data Table")}{tabBtn("logistics","Logistics")}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16,alignItems:"center"}}>
        <input placeholder="Search customer or tenant ID…" value={q} onChange={e=>setQ(e.target.value)} style={{padding:"7px 14px",borderRadius:10,border:"1px solid #44403c",background:"#1c1917",color:"#fafaf9",fontSize:12,width:220,outline:"none",fontFamily:"monospace"}}/>
      </div>

      {tab==="overview" && <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(185px,1fr))",gap:12,marginBottom:20}}>
          <MetricCard icon="📦" label="Total Purchased" value={fmt(TP)} sub={fil.length+" tenants tracked"}/>
          <MetricCard icon="🚚" label="Total Shipped" value={fmt(TS)} sub={Math.round(TS/TP*100)+"% of purchased"} accent="#fb923c"/>
          <MetricCard icon="⚙️" label="Configured" value={fmt(TC)} sub={Math.round(TC/TS*100)+"% of shipped"} accent="#fdba74"/>
          <MetricCard icon="📊" label="L4W Active" value={fmt(TL)} sub={actT.length+" active tenants"} accent="#22c55e"/>
          <MetricCard icon="📈" label="Avg Usage" value={avgU+"%"} sub="among active tenants" accent="#3b82f6"/>
        </div>

        <Panel style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <SH>Weekly Active Devices Trend</SH>
            <div style={{display:"flex",gap:4}}>
              {[["3m","3 Mo"],["6m","6 Mo"],["1y","1 Yr"],["all","All"]].map(([k,l])=><button key={k} onClick={()=>setTr(k)} style={{padding:"4px 10px",borderRadius:6,border:tr===k?"1px solid #f97316":"1px solid #44403c",background:tr===k?"rgba(249,115,22,.12)":"transparent",color:tr===k?"#fb923c":"#78716c",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"monospace"}}>{l}</button>)}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={240}>
            <AreaChart data={trendData}>
              <defs><linearGradient id="og" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#f97316" stopOpacity={.3}/><stop offset="95%" stopColor="#f97316" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#292524"/>
              <XAxis dataKey="date" tick={{fill:"#78716c",fontSize:9,fontFamily:"monospace"}} interval={Math.max(0,Math.floor(trendData.length/12))}/>
              <YAxis tick={{fill:"#78716c",fontSize:9,fontFamily:"monospace"}}/>
              <Tooltip content={<CT/>}/>
              <Area type="monotone" dataKey="usage" stroke="#f97316" fill="url(#og)" strokeWidth={2} name="Active Devices" dot={false}/>
            </AreaChart>
          </ResponsiveContainer>
        </Panel>

        <Panel style={{marginBottom:16}}>
          <SH badge={topP.length+" with orders"}>Purchased · Shipped · Configured</SH>
          <ResponsiveContainer width="100%" height={700}>
            <BarChart data={topP.slice(0,15).map(t=>({name:t.name.length>18?t.name.slice(0,17)+"…":t.name,purchased:t.pur,shipped:t.ship,configured:t.conf}))} layout="vertical" barGap={6} barSize={10} barCategoryGap="25%" margin={{left:10,right:40,top:10,bottom:10}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#292524" horizontal={false}/>
              <XAxis type="number" tick={{fill:"#78716c",fontSize:10,fontFamily:"monospace"}}/>
              <YAxis dataKey="name" type="category" width={160} tick={{fill:"#a8a29e",fontSize:12,fontFamily:"monospace"}} interval={0}/>
              <Tooltip content={<CT/>}/><Legend wrapperStyle={{fontSize:12,fontFamily:"monospace",paddingTop:12}}/>
              <Bar dataKey="purchased" fill="#3b82f6" radius={[0,5,5,0]} name="Purchased"/>
              <Bar dataKey="shipped" fill="#f97316" radius={[0,5,5,0]} name="Shipped"/>
              <Bar dataKey="configured" fill="#22c55e" radius={[0,5,5,0]} name="Configured"/>
            </BarChart>
          </ResponsiveContainer>
        </Panel>

        {usageC.length>0 && <Panel>
          <SH badge={usageC.length+" active"}>Last 4 Weeks (L4W) Active Devices by Customer</SH>
          <ResponsiveContainer width="100%" height={Math.max(200,usageC.length*28)}>
            <BarChart data={usageC} layout="vertical" barSize={14}>
              <CartesianGrid strokeDasharray="3 3" stroke="#292524" horizontal={false}/>
              <XAxis type="number" tick={{fill:"#78716c",fontSize:9,fontFamily:"monospace"}}/>
              <YAxis dataKey="name" type="category" width={120} tick={{fill:"#a8a29e",fontSize:10,fontFamily:"monospace"}}/>
              <Tooltip content={<CT/>}/>
              <Bar dataKey="l4w" name="L4W Active" radius={[0,6,6,0]}>
                {usageC.map((e,i)=><Cell key={i} fill={e.l4w>=10?"#22c55e":e.l4w>=3?"#f97316":"#ef4444"}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </Panel>}
      </div>}

      {tab==="table" && <Panel>
        <SH badge={srt.length+" tenants"}>Full Tenant Data</SH>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{th("name","Customer")}{th("tid","Tenant ID")}{th("pur","Purchased")}{th("ship","Shipped")}{th("conf","Configured")}{th("l4w","L4W")}{th("pct","% Used")}</tr></thead>
            <tbody>{srt.map(r=><tr key={r.id} onMouseEnter={e=>{e.currentTarget.style.background="rgba(249,115,22,.04)"}} onMouseLeave={e=>{e.currentTarget.style.background="transparent"}}>
              <td style={{...td,color:"#fafaf9",fontWeight:600}}>{r.name}</td>
              <td style={td}>{r.tid}</td><td style={td}>{fmt(r.pur)}</td><td style={td}>{fmt(r.ship)}</td><td style={td}>{fmt(r.conf)}</td><td style={td}>{fmt(r.l4w)}</td>
              <td style={td}><div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:44,height:5,borderRadius:3,background:"#292524",overflow:"hidden"}}><div style={{width:Math.min(r.pct,100)+"%",height:"100%",borderRadius:3,background:r.pct>=60?"#22c55e":r.pct>=20?"#f97316":"#ef4444"}}/></div>
                <span style={{color:r.pct>=60?"#22c55e":r.pct>=20?"#f97316":r.pct>0?"#ef4444":"#78716c",fontWeight:700,fontSize:11}}>{r.pct}%</span>
              </div></td>
            </tr>)}</tbody>
          </table>
        </div>
      </Panel>}


      {tab==="logistics" && <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(185px,1fr))",gap:12,marginBottom:20}}>
          <MetricCard icon="📦" label="Unshipped" value={fmt(TP-TS)} sub={Math.round((TP-TS)/TP*100)+"% of purchased"}/>
          <MetricCard icon="🚛" label="Shipped Not Config'd" value={fmt(TS-TC)} sub={Math.round((TS-TC)/TS*100)+"% of shipped"} accent="#eab308"/>
          <MetricCard icon="⚙️" label="Configured" value={fmt(TC)} sub={Math.round(TC/TP*100)+"% of total"} accent="#22c55e"/>
          <MetricCard icon="📈" label="Ship Rate" value={Math.round(TS/TP*100)+"%"} sub={TS+" of "+TP} accent="#3b82f6"/>
          <MetricCard icon="💵" label="Avg Cost / Shipment" value="$200" sub="per shipment" accent="#a78bfa"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
          <Panel>
            <SH>Inventory Pipeline</SH>
            <div style={{display:"flex",flexDirection:"column",gap:12,padding:"12px 0"}}>
              {[{label:"Total Purchased",val:TP,p:100,color:"#f97316"},{label:"Shipped",val:TS,p:Math.round(TS/TP*100),color:"#fb923c"},{label:"Configured",val:TC,p:Math.round(TC/TP*100),color:"#fdba74"},{label:"L4W Active",val:TL,p:Math.round(TL/TP*100),color:"#22c55e"}].map((item,i)=><div key={i}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                  <span style={{color:"#a8a29e",fontFamily:"monospace"}}>{item.label}</span>
                  <span style={{color:item.color,fontWeight:700,fontFamily:"monospace"}}>{fmt(item.val)} ({item.p}%)</span>
                </div>
                <div style={{width:"100%",height:10,background:"#292524",borderRadius:5,overflow:"hidden"}}><div style={{width:item.p+"%",height:"100%",background:item.color,borderRadius:5}}/></div>
              </div>)}
            </div>
          </Panel>
          <Panel>
            <SH>Stock Status — Pandabox (Black)</SH>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
              {[{label:"In Warehouse",val:TP-TS,color:"#f97316"},{label:"Shipped/Pending",val:TS-TC,color:"#eab308"},{label:"Deployed",val:TC,color:"#22c55e"},{label:"Active L4W",val:TL,color:"#3b82f6"}].map((item,i)=><div key={i} style={{background:"#292524",borderRadius:10,padding:16,textAlign:"center",borderTop:"3px solid "+item.color}}>
                <div style={{fontSize:28,fontWeight:800,color:item.color}}>{fmt(item.val)}</div>
                <div style={{color:"#a8a29e",fontSize:10,fontFamily:"monospace",marginTop:2,fontWeight:600}}>{item.label}</div>
              </div>)}
            </div>
          </Panel>
        </div>
      </div>}
    </div>

    <footer style={{borderTop:"1px solid #292524",padding:"14px 24px",textAlign:"center",marginTop:30}}>
      <span style={{color:"#44403c",fontSize:10,fontFamily:"monospace"}}>Pandabox HQ · {TENANTS.length} tenants · Source: Google Sheets · {TP} units purchased</span>
    </footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
